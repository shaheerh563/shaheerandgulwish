<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shaheer & Gulwish RSVP</title>
    <link rel="stylesheet" href="styles.css?v=20260629a">
    <style>
      .guest-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}.guest-control{min-width:0;text-align:center}.stepper{display:grid;grid-template-columns:38px minmax(34px,1fr) 38px;min-height:44px;overflow:hidden;border:1px solid var(--line);border-radius:8px;background:#fffefa}.stepper input{border:0;border-radius:0;padding:0 4px;text-align:center;appearance:textfield}.stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{margin:0;appearance:none}.stepper-button{min-width:0;border:0;background:rgba(111,143,108,.12);color:var(--green-dark);cursor:pointer;font-size:1.25rem;line-height:1}.children-toggle{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px;text-align:center}.children-toggle select{width:auto;min-width:78px;max-width:92px;padding:10px 26px 10px 12px;text-align:center}.children-count{width:100%;max-width:220px;margin:10px auto 0}.children-count[hidden]{display:none}body[data-event="walima"] .stepper-button{background:rgba(127,18,29,.1);color:var(--rose)}@media (max-width:560px){.guest-grid{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}.stepper{grid-template-columns:32px minmax(28px,1fr) 32px}.children-toggle{gap:8px}}
    </style>
  </head>
  <body>
    <main class="page-shell">
      <section class="card-preview" aria-label="Wedding invitation preview">
        <div class="event-tabs" role="tablist" aria-label="Choose event">
          <button class="event-tab is-active" type="button" data-event="nikkah" aria-selected="true">
            Nikkah
          </button>
          <button class="event-tab" type="button" data-event="walima" aria-selected="false">
            Walima
          </button>
        </div>

        <div class="image-frame">
          <img id="invitationImage" src="nikkah-card-20260701.svg" alt="Toronto nikkah invitation card">
        </div>
      </section>

      <section class="rsvp-panel" aria-labelledby="formTitle">
        <p class="eyebrow">Shaheer & Gulwish</p>
        <h1 id="formTitle">RSVP</h1>
        <p id="eventSummary" class="event-summary">
          Toronto Nikkah, August 22, 2026 at 5:00 PM InshaAllah
        </p>
        <p class="rsvp-blessing">
          We would be honoured by your presence and kindly request your duas.
        </p>
        <form id="rsvpForm" novalidate>
          <input type="hidden" name="event" id="eventInput" value="Toronto Nikkah">
          <input type="hidden" name="event_city" id="eventCityInput" value="Toronto">
          <input type="hidden" name="event_date" id="eventDateInput" value="August 22, 2026">
          <input type="hidden" name="family" id="familyInput">

          <label>
            Full name
            <input name="name" type="text" autocomplete="name" required>
          </label>

          <div class="field-grid">
            <label>
              Phone
              <input name="phone" type="tel" autocomplete="tel" inputmode="tel">
            </label>
            <label>
              Email (optional)
              <input name="email" type="email" autocomplete="email">
            </label>
          </div>

          <fieldset>
            <legend>Will you attend?</legend>
            <div class="choice-row">
              <label class="choice">
                <input type="radio" name="attending" value="Yes" checked>
                <span>Yes</span>
              </label>
              <label class="choice">
                <input type="radio" name="attending" value="No">
                <span>No</span>
              </label>
            </div>
          </fieldset>

          <fieldset id="guestGroup" class="guest-group">
            <legend>Number of guests (including you)</legend>
            <div class="guest-grid">
              <label class="guest-control">
                <span>Male guests</span>
                <span class="stepper">
                  <button type="button" class="stepper-button" data-stepper-target="maleGuestCount" data-stepper-change="-1" aria-label="Decrease male guests">-</button>
                  <input id="maleGuestCount" name="guest_count_male" type="number" min="0" max="20" value="0" inputmode="numeric">
                  <button type="button" class="stepper-button" data-stepper-target="maleGuestCount" data-stepper-change="1" aria-label="Increase male guests">+</button>
                </span>
              </label>
              <label class="guest-control">
                <span>Female guests</span>
                <span class="stepper">
                  <button type="button" class="stepper-button" data-stepper-target="femaleGuestCount" data-stepper-change="-1" aria-label="Decrease female guests">-</button>
                  <input id="femaleGuestCount" name="guest_count_female" type="number" min="0" max="20" value="0" inputmode="numeric">
                  <button type="button" class="stepper-button" data-stepper-target="femaleGuestCount" data-stepper-change="1" aria-label="Increase female guests">+</button>
                </span>
              </label>
            </div>
            <label class="children-toggle">
              Bringing children?
              <select id="bringingChildren" name="bringing_children" onchange="syncGuestField()">
                <option value="No" selected>No</option>
                <option value="Yes">Yes</option>
              </select>
            </label>
            <label id="childrenCountWrap" class="guest-control children-count" hidden>
              <span>Children</span>
              <span class="stepper">
                <button type="button" class="stepper-button" data-stepper-target="childrenGuestCount" data-stepper-change="-1" aria-label="Decrease children">-</button>
                <input id="childrenGuestCount" name="guest_count_children" type="number" min="0" max="20" value="0" inputmode="numeric">
                <button type="button" class="stepper-button" data-stepper-target="childrenGuestCount" data-stepper-change="1" aria-label="Increase children">+</button>
              </span>
            </label>
            <input id="guestCount" name="guest_count" type="hidden" value="0">
          </fieldset>

          <label>
            Leave a message for the newlyweds
            <textarea name="message" rows="4"></textarea>
          </label>

          <button id="submitButton" class="submit-button" type="submit">
            Confirm RSVP
          </button>

          <p id="formStatus" class="form-status" role="status" aria-live="polite"></p>
          <p class="rsvp-deadline">Please confirm your presence by August 1.</p>
        </form>
      </section>
    </main>

    <script src="script.js?v=20260713a"></script>
    <script>
      function ensureInshaAllah() {
        const summary = document.querySelector("#eventSummary");
        if (summary && !summary.textContent.includes("InshaAllah")) {
          summary.textContent = `${summary.textContent.trim()} InshaAllah`;
        }
      }

      ensureInshaAllah();
      document.querySelectorAll(".event-tab").forEach((tab) => {
        tab.addEventListener("click", () => setTimeout(ensureInshaAllah, 0));
      });

      if (!window.rsvpStepperReady) {
        document.querySelectorAll("[data-stepper-target]").forEach((button) => {
          button.addEventListener("click", () => {
            const input = document.querySelector(`#${button.dataset.stepperTarget}`);
            const total = document.querySelector("#guestCount");

            if (!input) return;

            const change = Number(button.dataset.stepperChange) || 0;
            const min = Number(input.min) || 0;
            const max = Number(input.max) || 20;
            input.value = Math.min(Math.max((Number(input.value) || 0) + change, min), max);

            if (total) {
              const male = Number(document.querySelector("#maleGuestCount")?.value) || 0;
              const female = Number(document.querySelector("#femaleGuestCount")?.value) || 0;
              const children = Number(document.querySelector("#childrenGuestCount")?.value) || 0;
              total.value = male + female + children;
            }
          });
        });
      }
    </script>
  </body>
</html>
